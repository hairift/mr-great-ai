# Mr. Great AI — Nginx Reverse Proxy Configuration
# Replace YOUR_DOMAIN with your actual domain name

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

# Upstream backend
upstream mrgreat_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # SSL (managed by certbot)
    # ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max request body size
    client_max_body_size 5M;

    # Timeouts for LLM responses (can be slow)
    proxy_connect_timeout 30s;
    proxy_send_timeout 60s;
    proxy_read_timeout 120s;

    # API endpoints
    location /api/ {
        limit_req zone=api burst=10 nodelay;

        proxy_pass http://mrgreat_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, X-API-Key" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Health check (no rate limit)
    location /api/health {
        proxy_pass http://mrgreat_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Block everything else
    location / {
        return 404 '{"error": "Not found"}';
        add_header Content-Type application/json;
    }
}
